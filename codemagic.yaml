workflows:
  connect-t-android-native:
    name: Connect T Native Android Build
    instance_type: linux
    max_build_duration: 120

    environment:
      java: 21
      node: 22
      vars:
        EXPO_PUBLIC_API_URL: "https://connect-t-2.onrender.com"

    scripts:
      - name: Show exact source commit
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          cd "$CM_BUILD_DIR"
          pwd
          git branch --show-current || true
          git rev-parse HEAD
          git log --oneline -8
          ls -la
          ls -la mobile
          ls -la mobile/android

      - name: Verify latest UI source is present
        script: |
          cd "$CM_BUILD_DIR"
          grep -R "Hiring Overview" -n "mobile/app/jobs/(tabs)/index.tsx"
          grep -R "Find trusted local work" -n "mobile/app/jobs/(tabs)/index.tsx"
          grep -R "Connect T Control Center" -n mobile/app/super-admin-login.tsx
          grep -R "Open Super Admin Dashboard" -n mobile/app/super-admin-login.tsx

      - name: Clean old build outputs
        script: |
          cd "$CM_BUILD_DIR"
          rm -rf mobile/node_modules
          rm -rf mobile/android/app/build
          rm -rf mobile/android/build
          rm -rf mobile/android/.gradle
          rm -rf ~/.gradle/caches ~/.gradle/daemon ~/.gradle/native

      - name: Install Node dependencies
        script: |
          cd "$CM_BUILD_DIR/mobile"
          npm ci || npm install

      - name: Install Android SDK packages
        script: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          java -version
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973" \
            "ndk;27.1.12297006"
          yes | sdkmanager --licenses || true

      - name: Create local.properties
        script: |
          cd "$CM_BUILD_DIR/mobile/android"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties
          ls -la

      - name: Verify Gradle ABI split config
        script: |
          cd "$CM_BUILD_DIR"
          grep -n "splits\|abi\|universalApk\|abiFilters" mobile/android/app/build.gradle || true
          grep -q "universalApk false" mobile/android/app/build.gradle
          grep -q 'include "arm64-v8a"' mobile/android/app/build.gradle
          if grep -q "abiFilters" mobile/android/app/build.gradle; then
            echo "ERROR: abiFilters exists. Remove it."
            exit 1
          fi

      - name: TypeScript check
        script: |
          cd "$CM_BUILD_DIR/mobile"
          npx tsc --noEmit -p tsconfig.json

      - name: Build release APK
        script: |
          cd "$CM_BUILD_DIR/mobile/android"
          pwd
          ls -la
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --max-workers=2 --stacktrace

      - name: Inspect APK ABI and size
        script: |
          cd "$CM_BUILD_DIR/mobile"
          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          apks = sorted(Path("android/app/build/outputs/apk").rglob("*.apk"))
          if not apks:
              raise SystemExit("No APK generated")

          for apk in apks:
              abis = set()
              with zipfile.ZipFile(apk) as z:
                  for name in z.namelist():
                      if name.startswith("lib/") and name.endswith(".so"):
                          abis.add(name.split("/")[1])

              size_mb = apk.stat().st_size / 1024 / 1024
              print(apk)
              print("size_mb:", round(size_mb, 2))
              print("abis:", sorted(abis))

              if "x86" in abis or "x86_64" in abis or "armeabi-v7a" in abis:
                  raise SystemExit("ERROR: universal/wrong ABI APK detected")
          PY

      - name: Build release AAB
        script: |
          cd "$CM_BUILD_DIR/mobile/android"
          ./gradlew :app:bundleRelease --no-daemon --max-workers=2 --stacktrace

      - name: List final outputs
        script: |
          cd "$CM_BUILD_DIR"
          echo "=== APK ==="
          find mobile/android/app/build/outputs/apk -type f -name "*.apk" -printf "%s %p\n" | sort -nr || true
          echo "=== AAB ==="
          find mobile/android/app/build/outputs/bundle -type f -name "*.aab" -printf "%s %p\n" | sort -nr || true

    artifacts:
      - mobile/android/app/build/outputs/apk/**/*.apk
      - mobile/android/app/build/outputs/bundle/**/*.aab
      - mobile/android/app/build/outputs/mapping/release/mapping.txt
