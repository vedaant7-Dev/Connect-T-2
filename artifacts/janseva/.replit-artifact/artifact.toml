kind = "mobile"
previewPath = "/"
title = "JanSeva"
version = "1.0.0"
id = "artifacts/janseva"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24866

[services.development]
run = "pnpm --filter @workspace/janseva run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/janseva", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/janseva", "run", "serve" ]

[services.env]
PORT = "24866"
BASE_PATH = "/"
