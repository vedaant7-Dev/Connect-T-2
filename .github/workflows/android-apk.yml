name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - "tsconfig.json"
      - "types/**"
      - ".github/workflows/android-apk.yml"

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build native Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      EXPO_PUBLIC_API_URL: https://connect-t-2.onrender.com
      NODE_ENV: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"
          yes | sdkmanager --licenses || true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install mobile dependencies
        working-directory: mobile
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Typecheck mobile app
        working-directory: mobile
        run: npx tsc --noEmit -p tsconfig.json

      - name: Prepare native Android build
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Build debug APK with Gradle
        working-directory: mobile/android
        run: |
          set -o pipefail
          ./gradlew clean :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            -PreactNativeArchitectures=arm64-v8a 2>&1 | tee ../../android-gradle-build.log

      - name: List APK outputs
        if: always()
        run: find mobile/android/app/build/outputs/apk -type f -name "*.apk" -print -exec ls -lh {} \;

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-build-log
          path: android-gradle-build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: connect-t-debug-apk
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Write build summary
        if: always()
        run: |
          echo "## Connect-T Native Android APK Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Build type: Gradle debug APK for immediate testing" >> "$GITHUB_STEP_SUMMARY"
          echo "Backend: https://connect-t-2.onrender.com" >> "$GITHUB_STEP_SUMMARY"
          echo "Architecture: arm64-v8a" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the APK from the workflow Artifacts section: connect-t-debug-apk" >> "$GITHUB_STEP_SUMMARY"
